<body>
  <main id="value">
    <div class="ja_app"></div>
    <div class="en_app">
      <b class="title"></b><br/>
      <span class="description"></span>
    </div>
    <script src="index.js"></script>
  </main>

  <section id="images">
    <video webkit-playsinline playsinline muted autoplay loop>
      <source src="___" type="video/mp4"></source>
    </video>

    <script>
    var random = [
      "show/001.jpeg",
      "show/002.jpeg",
      "show/003.jpeg",
      "show/004.jpeg",
      "show/005.jpeg",
      "show/006.jpeg"
    ];

    function randomImg(randomArray) {
      let random =
      randomArray[Math.floor(Math.random() * randomArray.length)];
      console.log(random);
      return random;
    }

    function backgroundImage() {
      let images = document.querySelector("#images");
      images.style.backgroundImage = `url(${randomImg(random)})`;
    }
    window.setInterval(function() {
      backgroundImage();
    }, 250);
    </script>
  </section>

  <button id="enter" type="button"><b></b></button>

  <script>
  let btn = document.querySelector('#enter');
  let open = document.querySelector('body');

  let btnToggleclass = function(el) {
    el.classList.toggle('open');
  }

  btn.addEventListener('click', function() {
    btnToggleclass(open);
  }, false);
  </script>

  <a id="link" href="https://creative-community.space/value/gallery/" target="_parent">大切にすることを大切にするためのギャラリー</a>

</body>
